server:
  port: 8080
  forward-headers-strategy: framework # 프록시(ALB/nginx)의 X-Forwarded-* 헤더로 외부 주소(https) 기준 URL 생성 (OAuth redirect_uri)

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    properties:
      hibernate:
        format_sql: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  kafka:
    properties:
      security.protocol: SASL_SSL
      sasl.mechanism: PLAIN
      sasl.jaas.config: org.apache.kafka.common.security.plain.PlainLoginModule required username="${CONFLUENT_API_KEY}" password="${CONFLUENT_API_SECRET}";
      connections.max.idle.ms: 180000
      metadata.max.age.ms: 180000
    producer:
      properties:
        request.timeout.ms: 30000
        delivery.timeout.ms: 60000
        reconnect.backoff.ms: 1000
        reconnect.backoff.max.ms: 10000

logging:
  level:
    org.hibernate.SQL: info

management:
  endpoint:
    health:
      show-details: never
  info:
    env:
      enabled: false

mopl:
  storage:
    type: s3
  cookie:
    secure: ${COOKIE_SECURE:true} # https 배포 기본 true, 로컬 docker-compose(http)는 false로 오버라이드