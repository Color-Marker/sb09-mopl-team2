spring:
  application:
    name: mopl
  session:
    store-type: redis
    redis:
      namespace: mopl:session

  servlet:
    multipart:
      maxFileSize: 10MB # 파일 하나의 최대 크기
      maxRequestSize: 30MB  # 한 번에 최대 업로드 가능 용량
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/mopl?reWriteBatchedInserts=true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_updates: true
        order_inserts: true
  profiles:
    active:
      - ${SPRING_PROFILES_ACTIVE:dev}
  config:
    import: optional:file:.env[.properties]
  cache:
    type: redis
    # cache-names:
      # - 쓸 캐시 이름들
    redis:
      enable-statistics: true
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: mopl-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
  batch:
    jdbc:
      initialize-schema: always
    job:
      enabled: false # 서버 켜면 자동으로 배치 돌려야 하는 경우 true 이용
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: email, profile
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope: profile_nickname, profile_image
            client-name: Kakao
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
  elasticsearch:
    uris: ${ELASTICSEARCH_URIS:http://localhost:9200}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers
  endpoint:
    health:
      show-details: always
  observations:
    annotations:
      enabled: true

info:
  name: Mopl
  version: 0.0.1-SNAPSHOT
  java:
    version: 17
  spring-boot:
    version: 3.4.0
  config:
    datasource:
      url: ${spring.datasource.url}
      driver-class-name: ${spring.datasource.driver-class-name}
    jpa:
      ddl-auto: ${spring.jpa.hibernate.ddl-auto}
    storage:
      type: ${mopl.storage.type}
      path: ${mopl.storage.local.root-path}
    multipart:
      max-file-size: ${spring.servlet.multipart.maxFileSize}
      max-request-size: ${spring.servlet.multipart.maxRequestSize}

mopl:
  storage:
    type: ${STORAGE_TYPE:local}  # local | s3 (기본값: local)
    local:
      root-path: ${STORAGE_LOCAL_ROOT_PATH:.mopl/storage}
    s3:
      access-key: ${AWS_S3_ACCESS_KEY}
      secret-key: ${AWS_S3_SECRET_KEY}
      region: ${AWS_S3_REGION}
      bucket: ${AWS_S3_BUCKET}
      presigned-url-expiration: ${AWS_S3_PRESIGNED_URL_EXPIRATION:600} # (기본값: 10분)
  admin:
    username: ${MOPL_ADMIN_USERNAME}
    email: ${MOPL_ADMIN_EMAIL}
    password: ${MOPL_ADMIN_PASSWORD}
  jwt:
    access-token:
      secret: ${JWT_ACCESS_SECRET:your-access-token-secret-key-here-make-it-long-and-random}
      expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:1800000} # 30 minutes
    refresh-token:
      secret: ${JWT_REFRESH_SECRET:your-refresh-token-secret-key-here-make-it-different-and-long}
      expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000} # 7 days
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:8080}
  cookie:
    secure: ${COOKIE_SECURE:false} # https 환경에서만 true (prod 프로필에서 활성화)
  mail:
    type: smtp

tmdb:
  api:
    key: ${TMDB_API_KEY}
    base-url: https://api.themoviedb.org

Sports:
  api:
    key: ${SPORTS_API_KEY}
    base-url: https://www.thesportsdb.com/api/v1/json


logging:
  level:
    root: info

sse:
  timeout: 300000
  event-queue-capacity: 500
