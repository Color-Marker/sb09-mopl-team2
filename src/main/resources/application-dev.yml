server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/mopl
    username: mopl_user
    password: mopl1234
  jpa:
    properties:
      hibernate:
        format_sql: true

logging:
  level:
    org.hibernate.SQL: debug
    org.hibernate.orm.jdbc.bind: trace
    org.springframework.security: trace

management:
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true