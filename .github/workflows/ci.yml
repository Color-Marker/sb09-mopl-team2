name: ci 테스트

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch: # 수동으로 돌리기 가능

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 테스트 실행
        run: ./gradlew test jacocoTestReport

      - name: Codecov 테스트 커버리지 업로드
        uses: codecov/codecov-action@v3
        with:
          files: build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.CODECOV_TOKEN }}
  deploy:
    needs: build # ⭐ 중요: 앞선 CI(build) 단계가 '성공'해야만 배포가 시작됩니다!
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # ⭐ main 브랜치에 merge/push 될 때만 실행!
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: JDK 17 설정 (도커 빌드 전 JAR 생성을 위해 필요)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'corretto'
          cache: gradle

      - name: Gradle 실행 권한 부여
        run: chmod +x gradlew

      - name: 프로젝트 JAR 빌드 (테스트는 CI에서 했으므로 제외하고 빠르게 빌드)
        run: ./gradlew build -x test

      - name: AWS 자격 증명 설정 (IAM)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-northeast-2

      - name: Amazon ECR 로그인
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Docker 이미지 빌드 및 ECR에 푸시 (Nginx & Backend)
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          NGINX_REPO: mopl-nginx        # Nginx ECR 리포지토리명
          BACKEND_REPO: mopl-private    # 백엔드 ECR 리포지토리명
          IMAGE_TAG: latest
        run: |
          # 1. Nginx 이미지 빌드 및 푸시
          docker build -t $ECR_REGISTRY/$NGINX_REPO:$IMAGE_TAG -f nginx/Dockerfile ./nginx
          docker push $ECR_REGISTRY/$NGINX_REPO:$IMAGE_TAG
          
          # 2. 백엔드 이미지 빌드 및 푸시 (프로젝트 루트의 Dockerfile 사용)
          docker build -t $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG -f Dockerfile .
          docker push $ECR_REGISTRY/$BACKEND_REPO:$IMAGE_TAG

      - name: Amazon ECS 서비스 강제 재배포 (새 이미지 업데이트)
        run: |
          # 1. Nginx 서비스 강제 재배포
          aws ecs update-service \
            --cluster mopl \
            --service mopl-nginx-task-service \
            --force-new-deployment
          
          # 2. 백엔드 서비스 강제 재배포
          aws ecs update-service \
            --cluster mopl \
            --service mopl-backend-task-service \
            --force-new-deployment
